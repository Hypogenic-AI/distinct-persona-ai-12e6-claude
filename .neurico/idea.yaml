idea:
  title: Distinct Persona
  domain: artificial_intelligence
  hypothesis: 'It is very difficult for LLMs to have good collaborative friction without
    having a strong, distinct persona. Identity informs what an agent would push back
    on, and current attempts at neutrality create ''low identity'' speakers. While
    this works to some extent, it is not effective for collaboration. The research
    aims to discover what kinds of conversations require the other participant to
    genuinely believe something.

    '
  background:
    description: 'Hypothesis: it is very difficult for LLMs to have good collaborative
      friction without having a strong, distinct persona. It is identity that tells
      us what we would push back on, and current attempts at neutrality are equivalent
      to trying to create ''low identity'' speakers. This largely works, but not very
      well for collaboration. We are discovering what kind of conversations require
      the other person to really believe something.

      '
